<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Processos | Despachante de Bolso</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script src="/assets/cockpit-tema.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/cockpit.css" />
</head>
<body class="bg-background text-on-background font-sans">
<div class="flex h-screen overflow-hidden">
  <div id="sidebar"></div>
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <div id="topbar"></div>
    <main class="flex-1 overflow-y-auto p-6 lg:p-8 space-y-6">

      <div class="flex flex-col md:flex-row md:items-end justify-between gap-4">
        <div>
          <h2 class="text-3xl font-bold tracking-tight text-on-surface">Processos</h2>
          <p class="text-on-surface-variant mt-1">
            Todas as suas operações auditadas pelo motor — cada linha é um dossiê real com trilha de
            auditoria append-only.
          </p>
        </div>
        <a href="/simulacao"
          class="px-5 py-2.5 bg-secondary text-white rounded-lg font-bold flex items-center gap-2 hover:opacity-90 transition-opacity shrink-0">
          <span class="material-symbols-outlined text-sm">add</span> Nova operação
        </a>
      </div>

      <!-- Filtros por situação -->
      <div id="chips-situacao" class="flex items-center gap-2 overflow-x-auto pb-1"></div>

      <div class="bg-white border border-outline-variant rounded-xl overflow-hidden shadow-sm">
        <div class="p-4 border-b border-outline-variant flex justify-between items-center">
          <h3 class="text-lg font-semibold">Operações</h3>
          <span id="contagem" class="text-[13px] text-on-surface-variant">Carregando…</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse text-[13px]">
            <thead>
              <tr class="bg-surface-container-low text-on-surface-variant text-[11px] font-bold uppercase tracking-wider">
                <th class="px-4 py-3 border-b border-outline-variant">Referência</th>
                <th class="px-4 py-3 border-b border-outline-variant">Situação</th>
                <th class="px-4 py-3 border-b border-outline-variant">Achados</th>
                <th class="px-4 py-3 border-b border-outline-variant">Parecer do motor</th>
                <th class="px-4 py-3 border-b border-outline-variant">Criada em</th>
                <th class="px-4 py-3 border-b border-outline-variant text-right">Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-processos">
              <tr><td colspan="6" class="px-4 py-10 text-center text-on-surface-variant">Carregando operações…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
</div>

<script src="/assets/comum.js"></script>
<script>
  const { api, esc, fmtData, badgeDossie, montarShell } = window.Cockpit;

  let dossies = [];
  let situacaoAtiva = 'Todas';
  let termoBusca = '';

  montarShell('processos', {
    busca: {
      placeholder: 'Buscar por referência ou parecer…',
      aoFiltrar: (termo) => { termoBusca = termo; render(); },
    },
  });

  const SITUACOES = ['Todas', 'Em processamento', 'Com exceções', 'Concluído', 'Travado', 'Escalado'];

  function renderChips() {
    document.getElementById('chips-situacao').innerHTML = SITUACOES.map((s) => s === situacaoAtiva
      ? `<button data-s="${s}" class="chip px-4 py-1.5 bg-secondary text-white rounded-full text-[12px] font-bold whitespace-nowrap">${s}</button>`
      : `<button data-s="${s}" class="chip px-4 py-1.5 bg-white border border-outline-variant hover:border-secondary text-on-surface-variant rounded-full text-[12px] font-bold whitespace-nowrap transition-all">${s}</button>`
    ).join('');
    document.querySelectorAll('.chip').forEach((el) =>
      el.addEventListener('click', () => { situacaoAtiva = el.dataset.s; renderChips(); render(); }));
  }

  function render() {
    const filtrados = dossies.filter((d) => {
      const [rotulo] = badgeDossie(d);
      const casaSituacao = situacaoAtiva === 'Todas' || rotulo === situacaoAtiva;
      const texto = ((d.referencia || '') + ' ' + (d.mensagem || '')).toLowerCase();
      return casaSituacao && (!termoBusca || texto.includes(termoBusca));
    });
    document.getElementById('contagem').textContent = `${filtrados.length} de ${dossies.length}`;
    const corpo = document.getElementById('tabela-processos');
    if (!dossies.length) {
      corpo.innerHTML = `<tr><td colspan="6" class="px-4 py-12 text-center text-on-surface-variant">
        Nenhuma operação ainda. <a href="/simulacao" class="text-secondary font-bold hover:underline">Envie os documentos da primeira</a> —
        Invoice, Packing List e B/L passam pelo motor real de conciliação.</td></tr>`;
      return;
    }
    corpo.innerHTML = filtrados.length ? filtrados.map((d) => {
      const [rotulo, classes, ponto] = badgeDossie(d);
      return `<tr class="hover:bg-surface-container-low border-b border-outline-variant transition-colors">
        <td class="px-4 py-3 font-medium">${esc(d.referencia || d.id.slice(0, 8))}</td>
        <td class="px-4 py-3">
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold uppercase ${classes}">
            <span class="w-1.5 h-1.5 rounded-full ${ponto} mr-1.5"></span>${rotulo}</span>
        </td>
        <td class="px-4 py-3">${d.n_apontamentos}</td>
        <td class="px-4 py-3 max-w-md"><span class="line-clamp-2 text-on-surface-variant">${esc(d.mensagem || '—')}</span></td>
        <td class="px-4 py-3 font-mono text-[12px] whitespace-nowrap">${fmtData(d.criado_em)}</td>
        <td class="px-4 py-3 text-right whitespace-nowrap">
          <a href="/resultado?dossie_id=${encodeURIComponent(d.id)}" class="text-secondary hover:underline font-bold mr-3">ABRIR</a>
          <a href="/loading?dossie_id=${encodeURIComponent(d.id)}" class="text-on-surface-variant hover:text-secondary hover:underline font-bold" title="Acompanhar o processamento e a trilha">TRILHA</a>
        </td>
      </tr>`;
    }).join('')
    : '<tr><td colspan="6" class="px-4 py-10 text-center text-on-surface-variant">Nenhuma operação com esse filtro.</td></tr>';
  }

  (async function carregar() {
    try {
      const dados = await api('/dossies');
      dossies = dados.dossies || [];
      renderChips();
      render();
    } catch (erro) {
      document.getElementById('tabela-processos').innerHTML =
        `<tr><td colspan="6" class="px-4 py-10 text-center text-error">Não foi possível carregar: ${esc(erro.message)}</td></tr>`;
      document.getElementById('contagem').textContent = '—';
    }
  })();
</script>
</body>
</html>
