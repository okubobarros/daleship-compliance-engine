# Frente 2 — Bases normativas de comex (não dependem da escolha de órgão anuente).
# Fontes mapeadas em docs/ComexPilot.md + URLs verificadas pelo especialista (2026-07-04).
# Cada bloco é uma fonte; adicionar uma nova é acrescentar um bloco aqui, não escrever código.
#
# Loaders: 'ncm_json' (JSON oficial da NCM), 'file' (JSON verificado em seeds/),
# 'http' (stub — fonte cujo coletor ainda não foi implementado).
#
# EVITAR (bloqueio real por robots.txt — NÃO fazer scraping):
#   - siscomex.desenvolvimento.gov.br (inclui .../tratamento/ e .../consulta_tratamento.jsf)
# HEALTH-CHECK: portalunico.siscomex.gov.br/portal/parada-programada.json indica parada
#   programada diária (01:00–03:00). Não é fonte de dado — só sinal de disponibilidade.

fontes:
  # Base de tudo: nomenclatura NCM via JSON oficial do Portal Único. Prioridade 1.
  - orgao: SISCOMEX
    tipo_documento: NCM
    descricao: "Nomenclatura Comum do Mercosul (NCM) — JSON oficial do Portal Único"
    fonte_url: "https://portalunico.siscomex.gov.br/classif/api/publico/nomenclatura/download/json"
    loader: ncm_json
    bloqueado: false

  - orgao: RFB
    tipo_documento: RGI
    descricao: "Regras Gerais de Interpretação do Sistema Harmonizado"
    fonte_url: "https://www.gov.br/receitafederal/pt-br/assuntos/aduana-e-comercio-exterior/classificacao-fiscal-de-mercadorias"
    loader: http   # coletar+verificar; próxima na fila depois da NCM
    bloqueado: false

  - orgao: RFB
    tipo_documento: solucao_consulta
    descricao: "Soluções de Consulta / SD (busca pré-filtrada SC;SD no SIJUT2)"
    # Ponto de partida do loader (verificado acessível):
    fonte_url: "http://normas.receita.fazenda.gov.br/sijut2consulta/consulta.action?facetsExistentes=&orgaosSelecionados=&tiposAtosSelecionados=72%3B+73&lblTiposAtosSelecionados=SC%3B+SD&tipoAtoFacet=&siglaOrgaoFacet=&anoAtoFacet=&termoBusca=&numero_ato=&tipoData=2&dt_inicio=&dt_fim=&ano_ato=&x=9&y=11&p=1"
    # Alternativa/ementário: https://atosdecisorios.receita.fazenda.gov.br/consultaweb/index.jsf
    loader: http
    bloqueado: false

  - orgao: SISCOMEX
    tipo_documento: tratamento_administrativo
    descricao: "Tratamento Administrativo na Importação (gov.br/siscomex, Plone — sem bloqueio)"
    # Fonte primária acessível (NÃO usar a versão JSF em siscomex.desenvolvimento.gov.br):
    fonte_url: "https://www.gov.br/siscomex/pt-br/servicos/tratamento-administrativo-1/tratamento-administrativo-na-importacao/tratamento-administrativo-na-importacao"
    # Exportação (complementar): https://www.gov.br/siscomex/pt-br/servicos/tratamento-administrativo-1/tratamento-administrativo-de-exportacao-1/tratamento-administrativo-de-exportacao
    loader: http
    bloqueado: false

  - orgao: MDIC
    tipo_documento: acordo_comercial
    descricao: "Acordos comerciais vigentes por país/bloco"
    fonte_url: "https://www.gov.br/siscomex/pt-br/acordos-comerciais/acordos-comerciais"
    loader: http
    bloqueado: false
