# Frente 2 — Bases normativas de comex (não dependem da escolha de órgão anuente).
# Fontes mapeadas em docs/ComexPilot.md + URLs verificadas pelo especialista (2026-07-04).
# Cada bloco é uma fonte; adicionar uma nova é acrescentar um bloco aqui, não escrever código.
#
# Loaders: 'ncm_json' (JSON oficial da NCM), 'file' (JSON verificado em seeds/),
# 'http' (stub — fonte cujo coletor ainda não foi implementado).
#
# EVITAR (bloqueio real por robots.txt — NÃO fazer scraping):
#   - siscomex.desenvolvimento.gov.br (inclui .../tratamento/ e .../consulta_tratamento.jsf)
# HEALTH-CHECK: portalunico.siscomex.gov.br/portal/parada-programada.json indica parada
#   programada diária (01:00–03:00). Não é fonte de dado — só sinal de disponibilidade.

fontes:
  # Base de tudo: nomenclatura NCM via JSON oficial do Portal Único. Descrição HIERÁRQUICA
  # (concatenada) + EMBEDDING para sugestão de classificação (descrição do produto -> NCM
  # provável), a dor "risco de classificação" da call Bonano. Com billing Voyage, ~2 min.
  - orgao: SISCOMEX
    tipo_documento: NCM
    descricao: "Nomenclatura Comum do Mercosul (NCM) — JSON oficial do Portal Único"
    fonte_url: "https://portalunico.siscomex.gov.br/classif/api/publico/nomenclatura/download/json"
    loader: ncm_json
    sem_embedding: false
    bloqueado: false

  # RGI: texto oficial vigente publicado na NESH (IN RFB nº 2.169/2023). O loader resolve
  # o link do PDF vigente NA PÁGINA (não assume o nome do arquivo) e chunka nas 6 regras.
  - orgao: RFB
    tipo_documento: RGI
    descricao: "Regras Gerais de Interpretação do SH (seção inicial da NESH, IN RFB 2.169/2023)"
    fonte_url: "https://www.gov.br/receitafederal/pt-br/assuntos/aduana-e-comercio-exterior/classificacao-fiscal-de-mercadorias/notas-explicativas-do-sistema-harmonizado"
    loader: rgi_nesh
    bloqueado: false

  # Soluções de Consulta/Divergência via SIJUT2. A listagem traz a ementa completa inline
  # (~100 atos/página, paginação GET p=N, total lido da própria página — 159 págs ≈ 15,9k
  # atos de TODOS os assuntos tributários). O filtro client-side usa o campo oficial
  # 'Assunto:' da ementa para manter só classificação fiscal (o que o ComexPilot pede:
  # "NCM sugeridas pela própria RFB"). Cada ato entra com permalink próprio
  # (link.action?idAto=N) como fonte_url — citação direta ao ato, não à busca.
  - orgao: RFB
    tipo_documento: solucao_consulta
    descricao: "Soluções de Consulta/SD de Classificação de Mercadorias (SIJUT2, ementas)"
    fonte_url: "http://normas.receita.fazenda.gov.br/sijut2consulta/consulta.action?facetsExistentes=&orgaosSelecionados=&tiposAtosSelecionados=72%3B+73&lblTiposAtosSelecionados=SC%3B+SD&tipoAtoFacet=&siglaOrgaoFacet=&anoAtoFacet=&termoBusca=&numero_ato=&tipoData=2&dt_inicio=&dt_fim=&ano_ato=&x=9&y=11&p=1"
    # Alternativa/ementário: https://atosdecisorios.receita.fazenda.gov.br/consultaweb/index.jsf
    loader: sijut2_sc
    params:
      filtro_assunto: "Classificação de Mercadorias"
      delay_s: 1.0
    bloqueado: false

  # Tratamento Administrativo de Importação: compilado oficial de anuentes (99 linhas, 1 por
  # órgão/escopo, incl. ANVISA e MAPA). fonte_url é a PASTA /informacoes/ (fetchável por
  # httpx; a página /servicos/ dá 404 no client). O loader resolve 'compilado_ta_anuente*.xlsx'
  # (não assume o ano no nome) e sintetiza cada linha em prosa citável (embedding agrega).
  # NÃO usar a versão JSF por-NCM em siscomex.desenvolvimento.gov.br (robots.txt).
  # A tabela grande por-NCM (ta_lpco_att_imp.xlsx, abas por capítulo) fica p/ depois — é lookup.
  - orgao: SISCOMEX
    tipo_documento: tratamento_administrativo
    descricao: "Tratamento Administrativo de Importação — compilado de anuentes (gov.br/siscomex)"
    fonte_url: "https://www.gov.br/siscomex/pt-br/informacoes/tratamento-administrativos/tratamento-administrativo-na-importacao/"
    loader: tratamento_adm_ta
    bloqueado: false

# FORA DO ESCOPO DA FASE 1 (decidido): Acordos Comerciais não acionam LPCO/anuência,
# então saíram da fila da Fase 1. Referência preservada para retomada futura:
#   https://www.gov.br/siscomex/pt-br/acordos-comerciais/acordos-comerciais
