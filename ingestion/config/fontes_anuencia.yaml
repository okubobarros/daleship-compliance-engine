# Frente 1 (represada) — Normas de anuência (LPCO) por órgão anuente.
#
# Escopo inicial = 2 órgãos (Anvisa + MAPA), DESBLOQUEADOS: segundo o Bonano, são as
# anuências mais recorrentes na empresa. Manter só esses 2 é disciplina de validação
# (golden eval set + checagem de grounding com poucos órgãos primeiro), não limitação técnica.
#
# Anvisa/MAPA estão desbloqueados, mas ainda com loader 'http' (stub) — falta implementar/
# coletar a legislação específica de LPCO por NCM/procedimento. O pipeline reporta
# "[SEM LOADER]" e segue, sem derrubar a execução, até o coletor dessas fontes existir.
# Demais órgãos: entram DEPOIS — adicionar é só trocar bloqueado -> false e apontar loader/fonte.

fontes:
  - orgao: ANVISA
    tipo_documento: LPCO
    descricao: "Legislação de anuência Anvisa por NCM/procedimento (recorrente na empresa — Bonano)"
    fonte_url: "https://www.gov.br/anvisa/pt-br"
    loader: http
    bloqueado: false

  - orgao: MAPA
    tipo_documento: LPCO
    descricao: "Legislação de anuência MAPA por NCM/procedimento (recorrente na empresa — Bonano)"
    fonte_url: "https://www.gov.br/agricultura/pt-br"
    loader: http
    bloqueado: false

  # --- Órgãos fora do escopo inicial (entram na Fase 1 tardia / Fase 2). ---
  # Mantidos aqui para deixar explícito que expandir = destravar config, não recodar.
  - orgao: INMETRO
    tipo_documento: LPCO
    descricao: "Fora do escopo inicial (2 órgãos). Destravar quando o padrão estiver validado."
    fonte_url: "https://www.gov.br/inmetro/pt-br"
    loader: http
    bloqueado: true

  - orgao: IBAMA
    tipo_documento: LPCO
    descricao: "Fora do escopo inicial (2 órgãos)."
    fonte_url: "https://www.gov.br/ibama/pt-br"
    loader: http
    bloqueado: true

  - orgao: ANATEL
    tipo_documento: LPCO
    descricao: "Fora do escopo inicial (2 órgãos)."
    fonte_url: "https://www.gov.br/anatel/pt-br"
    loader: http
    bloqueado: true

  - orgao: ANP
    tipo_documento: LPCO
    descricao: "Fora do escopo inicial (2 órgãos)."
    fonte_url: "https://www.gov.br/anp/pt-br"
    loader: http
    bloqueado: true

  - orgao: EXERCITO
    tipo_documento: LPCO
    descricao: "Fora do escopo inicial (2 órgãos)."
    fonte_url: "https://www.gov.br/defesa/pt-br/assuntos/exercito"
    loader: http
    bloqueado: true
