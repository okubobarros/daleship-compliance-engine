<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Criar conta | Despachante de Bolso</title>
  <meta name="theme-color" content="#f3f4f6" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Poppins', system-ui, sans-serif;
      background:
        radial-gradient(1000px 420px at 18% 0%, rgba(37,99,235,.08), transparent 55%),
        radial-gradient(900px 360px at 84% 8%, rgba(249,115,22,.10), transparent 48%),
        #f3f4f6;
      color:#111827;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    a { color: inherit; text-decoration:none; }
    .wrap { width:100%; max-width:420px; padding:24px; }
    .brand { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:20px; }
    .brand img { width:44px; height:44px; border-radius:14px; border:1px solid #eceef1; background:#fff; box-shadow:0 10px 24px rgba(17,24,39,.06); object-fit:contain; }
    .brand-title { font-size:16px; font-weight:700; line-height:1.1; }
    .brand-sub { font-size:11px; color:#6b7280; margin-top:2px; }
    .panel {
      background:#fff;
      border:1px solid #eceef1;
      border-radius:28px;
      padding:32px 28px;
      box-shadow:0 24px 60px rgba(17,24,39,.08);
    }
    .eyebrow { font-size:12px; font-weight:800; letter-spacing:.16em; text-transform:uppercase; color:#4f46e5; text-align:center; }
    h1 { margin:10px 0 0; font-size:26px; line-height:1.15; letter-spacing:-.03em; text-align:center; }
    .lead { margin-top:10px; color:#6b7280; line-height:1.6; font-size:13px; text-align:center; }
    .field { display:flex; flex-direction:column; gap:8px; margin-top:18px; }
    .field label { font-size:12px; font-weight:700; color:#374151; }
    .field input {
      width:100%;
      border:1px solid #e5e7eb;
      border-radius:14px;
      padding:13px 14px;
      font: inherit;
      color:#111827;
      background:#fff;
      outline:none;
    }
    .field input:focus { border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .field .hint-inline { font-size:11px; color:#9aa1ab; font-weight:400; }
    .btn {
      margin-top:22px;
      width:100%;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:14px 18px;
      border-radius:14px;
      font-weight:700;
      border:none;
      cursor:pointer;
      font: inherit;
      background:linear-gradient(90deg,#2563EB,#6D28D9);
      color:#fff;
      box-shadow:0 16px 34px rgba(37,99,235,.22);
    }
    .btn:disabled { opacity:.6; cursor:not-allowed; box-shadow:none; }
    .error {
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(224,82,82,.24);
      background:rgba(224,82,82,.05);
      color:#9a3412;
      font-size:13px;
      line-height:1.55;
      display:none;
    }
    .error.show { display:block; }
    .success {
      margin-top:14px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(22,163,74,.24);
      background:rgba(22,163,74,.06);
      color:#166534;
      font-size:13px;
      line-height:1.55;
      display:none;
    }
    .success.show { display:block; }
    .hint { margin-top:18px; text-align:center; color:#9aa1ab; font-size:12px; line-height:1.6; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <img src="/logo.png" alt="Despachante de Bolso" />
      <div>
        <div class="brand-title">Despachante de Bolso</div>
        <div class="brand-sub">ComexPilot</div>
      </div>
    </div>
    <section class="panel">
      <div class="eyebrow">Nova conta</div>
      <h1>Criar conta para simular uma operação</h1>
      <p class="lead">Sua conta guarda o cadastro ERP e o histórico de correções entre visitas, para o agente ficar mais preciso a cada operação.</p>

      <form id="registro-form">
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="senha">Senha <span class="hint-inline">(mínimo 6 caracteres)</span></label>
          <input id="senha" name="senha" type="password" autocomplete="new-password" minlength="6" required />
        </div>
        <button class="btn" id="submit-button" type="submit">Criar conta</button>
        <div class="error" id="registro-error"></div>
        <div class="success" id="registro-sucesso"></div>
      </form>
      <p class="hint">Já tem conta? <a href="/login.html" style="color:#2563EB; font-weight:700;">Entrar</a></p>
    </section>
  </div>

  <script>
    const SUPABASE_URL = window.__SUPABASE_URL__ || 'https://upxhykukiafksgrgpwcu.supabase.co';
    const SUPABASE_ANON_KEY = window.__SUPABASE_ANON_KEY__ || 'sb_publishable_N_-t9y2RqTT5q9NvGekzhA_76Ndbi84';

    const form = document.getElementById('registro-form');
    const submitButton = document.getElementById('submit-button');
    const errorBox = document.getElementById('registro-error');
    const successBox = document.getElementById('registro-sucesso');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      errorBox.classList.remove('show');
      successBox.classList.remove('show');
      submitButton.disabled = true;
      submitButton.textContent = 'Criando conta...';
      try {
        const resposta = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', apikey: SUPABASE_ANON_KEY },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('senha').value,
          }),
        });
        const corpo = await resposta.json().catch(() => ({}));
        if (!resposta.ok) {
          throw new Error(corpo.error_description || corpo.msg || 'Não foi possível criar a conta.');
        }
        if (corpo.access_token) {
          // Confirmação de e-mail desligada no projeto — já vem com sessão, entra direto.
          const sessao = {
            token: corpo.access_token,
            cliente_id: corpo.user?.id,
            expira_em: Math.floor(Date.now() / 1000) + (corpo.expires_in || 3600),
          };
          localStorage.setItem('daleship.sessao', JSON.stringify(sessao));
          location.href = '/simulacao.html';
          return;
        }
        // Confirmação de e-mail ligada — sem sessão ainda, precisa clicar no link recebido.
        successBox.textContent = 'Conta criada. Confira seu e-mail para confirmar o cadastro antes de entrar.';
        successBox.classList.add('show');
        submitButton.textContent = 'Conta criada';
      } catch (erro) {
        errorBox.textContent = erro.message || 'Não foi possível criar a conta. Tente novamente.';
        errorBox.classList.add('show');
        submitButton.disabled = false;
        submitButton.textContent = 'Criar conta';
      }
    });
  </script>
</body>
</html>
